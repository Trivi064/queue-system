<!DOCTYPE html>
<html>
<head>
  <title>Queue System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      margin-top: 15px;
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
    #result {
      margin-top: 25px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>📋 Queue Management System</h1>

<button onclick="joinQueue()">Join Queue</button>

<div id="result"></div>

<hr>

<h2>Admin Panel</h2>

<input type="password" id="pass" placeholder="Enter password">
<br>
<button onclick="checkAdmin()">Access</button>

<div id="adminControls" style="display:none;">
  <button onclick="nextPerson()">Next</button>
  <br><br>
  <button onclick="resetQueue()" style="background-color:red; color:white;">
    Reset Queue
  </button>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBtIiNdx5cZwurBNZPrkaIe_pQaI92Qpzc",
  authDomain: "queue-management-system-83a71.firebaseapp.com",
  projectId: "queue-management-system-83a71",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ JOIN QUEUE
window.joinQueue = async function () {
  const ref = doc(db, "queue", "main");
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    alert("Database not initialized properly");
    return;
  }

  let lastNumber = snap.data().lastNumber || 0;
  let currentServing = snap.data().currentServing || 0;

  const myNumber = lastNumber + 1;

  await updateDoc(ref, {
    lastNumber: myNumber
  });

  const peopleAhead = myNumber - currentServing - 1;

  document.getElementById("result").innerHTML =
    `Your Queue Number: <b>${myNumber}</b><br>
     People ahead: ${peopleAhead}<br>
     Estimated wait: ${peopleAhead * 2} minutes`;
};

// ✅ ADMIN NEXT
window.nextPerson = async function () {
  const ref = doc(db, "queue", "main");

  await updateDoc(ref, {
    currentServing: increment(1)
  });

  alert("Moved to next!");
};

// 🔒 ADMIN PASSWORD
window.checkAdmin = function () {
  const password = document.getElementById("pass").value;

  if (password === "admin123") {
    document.getElementById("adminControls").style.display = "block";
  } else {
    alert("Wrong password");
  }
};
window.resetQueue = async function () {
  const confirmReset = confirm("Are you sure you want to reset the queue?");

  if (!confirmReset) return;

  const ref = doc(db, "queue", "main");

  await updateDoc(ref, {
    currentServing: 0,
    lastNumber: 0
  });

  alert("Queue reset successfully!");
};

</script>

</body>
</html>
