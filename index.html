<!DOCTYPE html>
<html>
<head>
  <title>Smart Queue System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background-color: #f5f7fa;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.9;
    }
    #result {
      margin-top: 25px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>📋 Smart Queue System</h1>
<p style="color: gray;">Scan QR → Get Token → Save Time</p>

<button onclick="joinQueue()">Join Queue</button>

<div id="result"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBtIiNdx5cZwurBNZPrkaIe_pQaI92Qpzc",
  authDomain: "queue-management-system-83a71.firebaseapp.com",
  projectId: "queue-management-system-83a71",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ JOIN QUEUE
window.joinQueue = async function () {
  const ref = doc(db, "queue", "main");
  const snap = await getDoc(ref);

  let lastNumber = snap.data().lastNumber || 0;
  let currentServing = snap.data().currentServing || 0;

  const myNumber = lastNumber + 1;

  await updateDoc(ref, {
    lastNumber: myNumber
  });

  const peopleAhead = myNumber - currentServing - 1;

  document.getElementById("result").innerHTML =
    `Your Queue Number: <b>${myNumber}</b><br>
     People ahead: ${peopleAhead}<br>
     Estimated wait: ${peopleAhead * 2} minutes`;
};

</script>

</body>
</html>
